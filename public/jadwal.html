<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jadwal Pengasuh - Daycare</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 font-sans pb-10">
    <nav class="bg-blue-800 p-4 shadow-md text-white mb-6">
        <div class="container mx-auto flex justify-between px-4 items-center">
            <h1 class="text-xl font-bold">Jadwal & Presensi Pengasuh</h1>
            <a href="index.html" class="text-sm bg-blue-700 hover:bg-blue-600 px-4 py-2 rounded transition-colors">⬅ Dashboard</a>
        </div>
    </nav>

    <div class="container mx-auto px-4 max-w-7xl">
        <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200 mb-8">
            <h3 id="form-title" class="text-lg font-bold mb-5 text-slate-800 border-b pb-2">Input Jadwal Baru</h3>
            <form id="formJadwal" class="grid grid-cols-1 md:grid-cols-3 gap-5">
                <input type="hidden" id="id_jadwal">
                
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1">ID Pengasuh</label>
                    <input type="number" id="id_pengasuh" required class="w-full border border-slate-300 p-2.5 rounded-lg focus:ring-2 focus:ring-blue-500">
                    <p id="preview_nama_pengasuh" class="text-sm font-medium mt-1 hidden"></p>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1">Tanggal</label>
                    <input type="date" id="tanggal" required class="w-full border border-slate-300 p-2.5 rounded-lg focus:ring-2 focus:ring-blue-500">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1">Status Kehadiran</label>
                    <select id="status_hadir" required class="w-full border border-slate-300 p-2.5 rounded-lg focus:ring-2 focus:ring-blue-500 bg-white">
                        <option value="Hadir">Hadir</option>
                        <option value="Izin">Izin</option>
                        <option value="Sakit">Sakit</option>
                        <option value="Alpa">Alpa</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1">Jam Mulai (Shift)</label>
                    <input type="time" id="jam_mulai" required class="w-full border border-slate-300 p-2.5 rounded-lg focus:ring-2 focus:ring-blue-500">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1">Jam Selesai (Shift)</label>
                    <input type="time" id="jam_selesai" required class="w-full border border-slate-300 p-2.5 rounded-lg focus:ring-2 focus:ring-blue-500">
                </div>
                <div class="col-span-1 md:col-span-3 grid grid-cols-2 gap-5 p-4 bg-slate-50 rounded-lg border border-slate-200 mt-2">
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-1">Jam Masuk (Real)</label>
                        <input type="time" id="jam_masuk_real" class="w-full border border-slate-300 p-2.5 rounded-lg focus:ring-2 focus:ring-blue-500">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-1">Jam Keluar (Real)</label>
                        <input type="time" id="jam_keluar_real" class="w-full border border-slate-300 p-2.5 rounded-lg focus:ring-2 focus:ring-blue-500">
                    </div>
                </div>
                
                <div class="md:col-span-3 flex gap-3 mt-2">
                    <button type="submit" id="btn-submit" class="bg-blue-600 text-white font-medium px-6 py-2.5 rounded-lg hover:bg-blue-700">Simpan Jadwal</button>
                    <button type="button" id="btn-cancel" class="hidden bg-slate-500 text-white font-medium px-6 py-2.5 rounded-lg hover:bg-slate-600">Batal</button>
                </div>
            </form>
        </div>

        <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse whitespace-nowrap">
                    <thead>
                        <tr class="bg-slate-100 text-slate-700 uppercase text-sm border-b">
                            <th class="p-4 font-semibold">Tgl & Pengasuh</th>
                            <th class="p-4 font-semibold">Shift Kerja</th>
                            <th class="p-4 font-semibold">Absensi (Real)</th>
                            <th class="p-4 font-semibold">Status</th>
                            <th class="p-4 font-semibold text-center">Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="data-jadwal" class="divide-y divide-slate-200"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const apiUrl = '/api/jadwal';

        function loadData() {
            fetch(apiUrl).then(res => res.json()).then(data => {
                const tbody = document.getElementById('data-jadwal');
                tbody.innerHTML = '';
                data.forEach(j => {
                    let badgeColor = 'bg-slate-100 text-slate-800';
                    if(j.status_hadir === 'Hadir') badgeColor = 'bg-green-100 text-green-800';
                    if(j.status_hadir === 'Izin' || j.status_hadir === 'Sakit') badgeColor = 'bg-amber-100 text-amber-800';
                    if(j.status_hadir === 'Alpa') badgeColor = 'bg-red-100 text-red-800';

                    const tr = document.createElement('tr');
                    tr.className = "hover:bg-slate-50";
                    tr.innerHTML = `
                        <td class="p-4">
                            <div class="font-bold text-slate-800">${j.tanggal}</div>
                            <div class="text-xs text-slate-500">ID Pengasuh: ${j.id_pengasuh}</div>
                        </td>
                        <td class="p-4 font-medium">${j.jam_mulai} - ${j.jam_selesai}</td>
                        <td class="p-4 text-blue-600">${j.jam_masuk_real || '-'} s/d ${j.jam_keluar_real || '-'}</td>
                        <td class="p-4"><span class="${badgeColor} px-3 py-1 rounded-full text-xs font-bold uppercase">${j.status_hadir}</span></td>
                        <td class="p-4 text-center">
                            <button onclick='editData(${JSON.stringify(j)})' class="bg-amber-400 text-amber-900 px-3 py-1 rounded text-sm mr-1">Edit</button>
                            <button onclick="hapusData(${j.id_jadwal})" class="bg-red-500 text-white px-3 py-1 rounded text-sm">Hapus</button>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });
            });
        }

        document.getElementById('formJadwal').addEventListener('submit', function(e) {
            e.preventDefault();
            const id = document.getElementById('id_jadwal').value;
            const payload = {
                id_pengasuh: document.getElementById('id_pengasuh').value,
                tanggal: document.getElementById('tanggal').value,
                jam_mulai: document.getElementById('jam_mulai').value,
                jam_selesai: document.getElementById('jam_selesai').value,
                jam_masuk_real: document.getElementById('jam_masuk_real').value || null,
                jam_keluar_real: document.getElementById('jam_keluar_real').value || null,
                status_hadir: document.getElementById('status_hadir').value
            };
            let method = id === '' ? 'POST' : 'PUT';
            let url = id === '' ? apiUrl : `${apiUrl}/${id}`;

            fetch(url, {
                method: method,
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            }).then(res => res.json()).then(res => {
                alert(res.pesan);
                if(res.status === 'sukses') { resetForm(); loadData(); }
            });
        });

        function editData(j) {
            document.getElementById('form-title').innerText = 'Edit Jadwal';
            document.getElementById('id_jadwal').value = j.id_jadwal;
            document.getElementById('id_pengasuh').value = j.id_pengasuh;
            document.getElementById('tanggal').value = j.tanggal;
            document.getElementById('jam_mulai').value = j.jam_mulai;
            document.getElementById('jam_selesai').value = j.jam_selesai;
            document.getElementById('jam_masuk_real').value = j.jam_masuk_real || '';
            document.getElementById('jam_keluar_real').value = j.jam_keluar_real || '';
            document.getElementById('status_hadir').value = j.status_hadir;
            document.getElementById('btn-submit').innerText = 'Update Jadwal';
            document.getElementById('btn-cancel').classList.remove('hidden');
        }

        function hapusData(id) {
            if(confirm('Hapus jadwal ini?')) {
                fetch(`${apiUrl}/${id}`, { method: 'DELETE' })
                .then(res => res.json()).then(res => { alert(res.pesan); loadData(); });
            }
        }

        function resetForm() {
            document.getElementById('formJadwal').reset();
            document.getElementById('id_jadwal').value = '';
            document.getElementById('form-title').innerText = 'Input Jadwal Baru';
            document.getElementById('btn-submit').innerText = 'Simpan Jadwal';
            document.getElementById('btn-cancel').classList.add('hidden');
        }
        document.getElementById('btn-cancel').addEventListener('click', resetForm);
        loadData();

        // Cek ID Pengasuh untuk Jadwal
let daftarPengasuhJadwal = [];
function ambilReferensiPengasuhJadwal() {
    fetch('/api/pengasuh')
        .then(res => res.json())
        .then(data => daftarPengasuhJadwal = data)
        .catch(err => console.error(err));
}

document.getElementById('id_pengasuh').addEventListener('input', function(e) {
    const inputId = parseInt(e.target.value);
    const previewEl = document.getElementById('preview_nama_pengasuh');

    if (!inputId) { previewEl.classList.add('hidden'); return; }

    const pengasuhDitemukan = daftarPengasuhJadwal.find(p => p.id_individu === inputId);
    previewEl.classList.remove('hidden');

    if (pengasuhDitemukan) {
        previewEl.innerText = '✅ Pengasuh: ' + pengasuhDitemukan.nama;
        previewEl.className = 'text-sm font-medium text-emerald-600 mt-1';
    } else {
        previewEl.innerText = '❌ ID Pengasuh tidak terdaftar!';
        previewEl.className = 'text-sm font-medium text-red-500 mt-1';
    }
});

// Panggil fungsi
ambilReferensiPengasuhJadwal();
    </script>
</body>
</html>
