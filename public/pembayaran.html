<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pembayaran - Daycare</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 font-sans pb-10">
    <nav class="bg-blue-800 p-4 shadow-md text-white mb-6">
        <div class="container mx-auto flex justify-between px-4 items-center">
            <h1 class="text-xl font-bold">Manajemen Pembayaran</h1>
            <a href="index.html" class="text-sm bg-blue-700 hover:bg-blue-600 px-4 py-2 rounded transition-colors">⬅ Dashboard</a>
        </div>
    </nav>

    <div class="container mx-auto px-4 max-w-5xl">
        <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200 mb-8">
            <h3 id="form-title" class="text-lg font-bold mb-5 text-slate-800 border-b pb-2">Catat Pembayaran</h3>
            <form id="formPembayaran" class="grid grid-cols-1 md:grid-cols-2 gap-5">
                <input type="hidden" id="id_pembayaran">
                
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1">ID Transaksi Titip</label>
                    <input type="number" id="id_transaksi" required class="w-full border border-slate-300 p-2.5 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1">Tanggal Bayar</label>
                    <input type="date" id="tanggal_bayar" required class="w-full border border-slate-300 p-2.5 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1">Jumlah Bayar (Rp)</label>
                    <input type="number" id="jumlah" required class="w-full border border-slate-300 p-2.5 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1">Status</label>
                    <select id="status" required class="w-full border border-slate-300 p-2.5 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none bg-white">
                        <option value="Pending">Pending</option>
                        <option value="Lunas">Lunas</option>
                    </select>
                </div>
                
                <div class="md:col-span-2 flex gap-3">
                    <button type="submit" id="btn-submit" class="bg-blue-600 text-white font-medium px-6 py-2.5 rounded-lg hover:bg-blue-700 transition-colors">Simpan Invoice</button>
                    <button type="button" id="btn-cancel" class="hidden bg-slate-500 text-white font-medium px-6 py-2.5 rounded-lg hover:bg-slate-600 transition-colors">Batal</button>
                </div>
            </form>
        </div>

        <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="bg-slate-100 text-slate-700 uppercase text-sm border-b">
                        <th class="p-4 font-semibold">ID Invoice</th>
                        <th class="p-4 font-semibold">ID Transaksi</th>
                        <th class="p-4 font-semibold">Tgl Bayar</th>
                        <th class="p-4 font-semibold">Jumlah</th>
                        <th class="p-4 font-semibold">Status</th>
                        <th class="p-4 font-semibold text-center">Aksi</th>
                    </tr>
                </thead>
                <tbody id="data-pembayaran" class="divide-y divide-slate-200"></tbody>
            </table>
        </div>
    </div>

    <script>
        const apiUrl = '/api/pembayaran';

        function loadData() {
            fetch(apiUrl).then(res => res.json()).then(data => {
                const tbody = document.getElementById('data-pembayaran');
                tbody.innerHTML = '';
                data.forEach(p => {
                    const statusClass = p.status === 'Lunas' ? 'bg-green-100 text-green-800' : 'bg-amber-100 text-amber-800';
                    const tr = document.createElement('tr');
                    tr.className = "hover:bg-slate-50";
                    tr.innerHTML = `
                        <td class="p-4 font-semibold">#INV-${p.id_pembayaran}</td>
                        <td class="p-4">#TRX-${p.id_transaksi}</td>
                        <td class="p-4">${p.tanggal_bayar}</td>
                        <td class="p-4 font-medium">Rp ${Number(p.jumlah).toLocaleString('id-ID')}</td>
                        <td class="p-4"><span class="${statusClass} px-2.5 py-1 rounded-full text-xs font-semibold">${p.status}</span></td>
                        <td class="p-4 text-center">
                            <button onclick='editData(${JSON.stringify(p)})' class="bg-amber-400 text-amber-900 px-3 py-1 rounded text-sm mr-1">Edit</button>
                            <button onclick="hapusData(${p.id_pembayaran})" class="bg-red-500 text-white px-3 py-1 rounded text-sm">Hapus</button>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });
            });
        }

        document.getElementById('formPembayaran').addEventListener('submit', function(e) {
            e.preventDefault();
            const id = document.getElementById('id_pembayaran').value;
            const payload = {
                id_transaksi: document.getElementById('id_transaksi').value,
                tanggal_bayar: document.getElementById('tanggal_bayar').value,
                jumlah: document.getElementById('jumlah').value,
                status: document.getElementById('status').value
            };
            let method = id === '' ? 'POST' : 'PUT';
            let url = id === '' ? apiUrl : `${apiUrl}/${id}`;

            fetch(url, {
                method: method,
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            }).then(res => res.json()).then(res => {
                alert(res.pesan);
                if(res.status === 'sukses') { resetForm(); loadData(); }
            });
        });

        function editData(p) {
            document.getElementById('form-title').innerText = 'Edit Data Pembayaran';
            document.getElementById('id_pembayaran').value = p.id_pembayaran;
            document.getElementById('id_transaksi').value = p.id_transaksi;
            document.getElementById('tanggal_bayar').value = p.tanggal_bayar;
            document.getElementById('jumlah').value = p.jumlah;
            document.getElementById('status').value = p.status;
            document.getElementById('btn-submit').innerText = 'Update Invoice';
            document.getElementById('btn-cancel').classList.remove('hidden');
        }

        function hapusData(id) {
            if(confirm('Hapus transaksi pembayaran ini?')) {
                fetch(`${apiUrl}/${id}`, { method: 'DELETE' })
                .then(res => res.json()).then(res => { alert(res.pesan); loadData(); });
            }
        }

        function resetForm() {
            document.getElementById('formPembayaran').reset();
            document.getElementById('id_pembayaran').value = '';
            document.getElementById('form-title').innerText = 'Catat Pembayaran';
            document.getElementById('btn-submit').innerText = 'Simpan Invoice';
            document.getElementById('btn-cancel').classList.add('hidden');
        }
        document.getElementById('btn-cancel').addEventListener('click', resetForm);
        loadData();
    </script>
</body>
</html>
