<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Pengasuh - Daycare</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 font-sans pb-10">
    <nav class="bg-blue-800 p-4 shadow-md text-white mb-6">
        <div class="container mx-auto flex justify-between px-4 items-center">
            <h1 class="text-xl font-bold">Manajemen Data Pengasuh</h1>
            <a href="index.html" class="text-sm bg-blue-700 hover:bg-blue-600 px-4 py-2 rounded transition-colors">⬅ Dashboard</a>
        </div>
    </nav>

    <div class="container mx-auto px-4 max-w-6xl">
        <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200 mb-8">
            <h3 id="form-title" class="text-lg font-bold mb-5 text-slate-800 border-b pb-2">Tambah Pengasuh Baru</h3>
            <form id="formPengasuh" class="grid grid-cols-1 md:grid-cols-2 gap-5">
                <input type="hidden" id="id_individu">
                
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1">Nama Lengkap</label>
                    <input type="text" id="nama" required class="w-full border border-slate-300 p-2.5 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1">No HP</label>
                    <input type="text" id="no_hp" required class="w-full border border-slate-300 p-2.5 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1">Email</label>
                    <input type="email" id="email" required class="w-full border border-slate-300 p-2.5 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1">Gaji (Rupiah)</label>
                    <input type="number" id="gaji" required class="w-full border border-slate-300 p-2.5 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none">
                </div>
                <div class="md:col-span-2">
                    <label class="block text-sm font-semibold text-slate-700 mb-1">Alamat</label>
                    <textarea id="alamat" required rows="2" class="w-full border border-slate-300 p-2.5 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none"></textarea>
                </div>
                
                <div class="md:col-span-2 flex gap-3">
                    <button type="submit" id="btn-submit" class="bg-blue-600 text-white font-medium px-6 py-2.5 rounded-lg hover:bg-blue-700 transition-colors">Simpan Pengasuh</button>
                    <button type="button" id="btn-cancel" class="hidden bg-slate-500 text-white font-medium px-6 py-2.5 rounded-lg hover:bg-slate-600 transition-colors">Batal</button>
                </div>
            </form>
        </div>

        <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="bg-slate-100 text-slate-700 uppercase text-sm border-b">
                        <th class="p-4 font-semibold">ID</th>
                        <th class="p-4 font-semibold">Nama</th>
                        <th class="p-4 font-semibold">No HP</th>
                        <th class="p-4 font-semibold">Email</th>
                        <th class="p-4 font-semibold">Gaji</th>
                        <th class="p-4 font-semibold text-center">Aksi</th>
                    </tr>
                </thead>
                <tbody id="data-pengasuh" class="divide-y divide-slate-200"></tbody>
            </table>
        </div>
    </div>

    <script>
        const apiUrl = '/api/pengasuh';

        function loadData() {
            fetch(apiUrl).then(res => res.json()).then(data => {
                const tbody = document.getElementById('data-pengasuh');
                tbody.innerHTML = '';
                data.forEach(p => {
                    const tr = document.createElement('tr');
                    tr.className = "hover:bg-slate-50";
                    tr.innerHTML = `
                        <td class="p-4">${p.id_individu}</td>
                        <td class="p-4 font-medium">${p.nama}</td>
                        <td class="p-4">${p.no_hp}</td>
                        <td class="p-4">${p.email}</td>
                        <td class="p-4">Rp ${idrFormat(p.gaji)}</td>
                        <td class="p-4 text-center">
                            <button onclick='editData(${JSON.stringify(p)})' class="bg-amber-400 text-amber-900 px-3 py-1 rounded text-sm mr-1">Edit</button>
                            <button onclick="hapusData(${p.id_individu})" class="bg-red-500 text-white px-3 py-1 rounded text-sm">Hapus</button>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });
            });
        }

        document.getElementById('formPengasuh').addEventListener('submit', function(e) {
            e.preventDefault();
            const id = document.getElementById('id_individu').value;
            const payload = {
                nama: document.getElementById('nama').value,
                no_hp: document.getElementById('no_hp').value,
                email: document.getElementById('email').value,
                gaji: document.getElementById('gaji').value,
                alamat: document.getElementById('alamat').value
            };
            let method = id === '' ? 'POST' : 'PUT';
            let url = id === '' ? apiUrl : `${apiUrl}/${id}`;

            fetch(url, {
                method: method,
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            }).then(res => res.json()).then(res => {
                alert(res.pesan);
                if(res.status === 'sukses') { resetForm(); loadData(); }
            });
        });

        function editData(p) {
            document.getElementById('form-title').innerText = 'Edit Data Pengasuh';
            document.getElementById('id_individu').value = p.id_individu;
            document.getElementById('nama').value = p.nama;
            document.getElementById('no_hp').value = p.no_hp;
            document.getElementById('email').value = p.email;
            document.getElementById('gaji').value = p.gaji;
            document.getElementById('alamat').value = p.alamat;
            document.getElementById('btn-submit').innerText = 'Update Data';
            document.getElementById('btn-cancel').classList.remove('hidden');
        }

        function hapusData(id) {
            if(confirm('Hapus pengasuh ini?')) {
                fetch(`${apiUrl}/${id}`, { method: 'DELETE' })
                .then(res => res.json()).then(res => { alert(res.pesan); loadData(); });
            }
        }

        function idrFormat(val) { return Number(val).toLocaleString('id-ID'); }
        function resetForm() {
            document.getElementById('formPengasuh').reset();
            document.getElementById('id_individu').value = '';
            document.getElementById('form-title').innerText = 'Tambah Pengasuh Baru';
            document.getElementById('btn-submit').innerText = 'Simpan Pengasuh';
            document.getElementById('btn-cancel').classList.add('hidden');
        }
        document.getElementById('btn-cancel').addEventListener('click', resetForm);
        loadData();
    </script>
</body>
</html>
