<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Orang Tua - Daycare</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 font-sans pb-10">
    <nav class="bg-blue-800 p-4 shadow-md text-white mb-6">
        <div class="container mx-auto flex justify-between px-4 items-center">
            <h1 class="text-xl font-bold">Manajemen Data Orang Tua</h1>
            <a href="index.html" class="text-sm bg-blue-700 hover:bg-blue-600 px-4 py-2 rounded transition-colors">⬅ Dashboard</a>
        </div>
    </nav>

    <div class="container mx-auto px-4 max-w-6xl">
        <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200 mb-8">
            <h3 id="form-title" class="text-lg font-bold mb-5 text-slate-800 border-b pb-2">Tambah Orang Tua Baru</h3>
            <form id="formOrangTua" class="grid grid-cols-1 md:grid-cols-2 gap-5">
                <input type="hidden" id="id_individu">
                
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1">Nama Lengkap</label>
                    <input type="text" id="nama" required class="w-full border border-slate-300 p-2.5 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1">No HP</label>
                    <input type="text" id="no_hp" placeholder="08123456789"  required class="placeholder:italic w-full border border-slate-300 p-2.5 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1">Email</label>
                    <input type="email" id="email" placeholder="Anda@gmail.com" required class="w-full border placeholder:italic border-slate-300 p-2.5 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1">Pekerjaan</label>
                    <input type="text" id="pekerjaan" required class="w-full border border-slate-300 p-2.5 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1">Kontak Darurat</label>
                    <input type="text" id="kontak_darurat" placeholder="08123456789" required class="w-full placeholder:italic border border-slate-300 p-2.5 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none">
                </div>
                <div class="md:col-span-2">
                    <label class="block text-sm font-semibold text-slate-700 mb-1">Alamat</label>
                    <textarea id="alamat" required rows="2" class="w-full border border-slate-300 p-2.5 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none"></textarea>
                </div>
                
                <div class="md:col-span-2 flex gap-3">
                    <button type="submit" id="btn-submit" class="bg-blue-600 text-white font-medium px-6 py-2.5 rounded-lg hover:bg-blue-700 transition-colors">Simpan Data</button>
                    <button type="button" id="btn-cancel" class="hidden bg-slate-500 text-white font-medium px-6 py-2.5 rounded-lg hover:bg-slate-600 transition-colors">Batal</button>
                </div>
            </form>
        </div>

        <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="bg-slate-100 text-slate-700 uppercase text-sm border-b">
                        <th class="p-4 font-semibold">ID</th>
                        <th class="p-4 font-semibold">Nama</th>
                        <th class="p-4 font-semibold">No HP</th>
                        <th class="p-4 font-semibold">Pekerjaan</th>
                        <th class="p-4 font-semibold">Kontak Darurat</th>
                        <th class="p-4 font-semibold text-center">Aksi</th>
                    </tr>
                </thead>
                <tbody id="data-orangtua" class="divide-y divide-slate-200"></tbody>
            </table>
        </div>
    </div>

    <script>
        const apiUrl = '/api/orangtua';

        function loadData() {
            fetch(apiUrl)
                .then(res => res.json())
                .then(data => {
                    const tbody = document.getElementById('data-orangtua');
                    tbody.innerHTML = '';
                    data.forEach(ortu => {
                        const tr = document.createElement('tr');
                        tr.className = "hover:bg-slate-50";
                        tr.innerHTML = `
                            <td class="p-4">${ortu.id_individu}</td>
                            <td class="p-4 font-medium">${ortu.nama}</td>
                            <td class="p-4">${ortu.no_hp}</td>
                            <td class="p-4">${ortu.pekerjaan}</td>
                            <td class="p-4">${ortu.kontak_darurat}</td>
                            <td class="p-4 text-center">
                                <button onclick='editData(${JSON.stringify(ortu)})' class="bg-amber-400 text-amber-900 px-3 py-1 rounded text-sm mr-1">Edit</button>
                                <button onclick="hapusData(${ortu.id_individu})" class="bg-red-500 text-white px-3 py-1 rounded text-sm">Hapus</button>
                            </td>
                        `;
                        tbody.appendChild(tr);
                    });
                });
        }

        document.getElementById('formOrangTua').addEventListener('submit', function(e) {
            e.preventDefault();
            const id = document.getElementById('id_individu').value;
            const payload = {
                nama: document.getElementById('nama').value,
                no_hp: document.getElementById('no_hp').value,
                email: document.getElementById('email').value,
                pekerjaan: document.getElementById('pekerjaan').value,
                kontak_darurat: document.getElementById('kontak_darurat').value,
                alamat: document.getElementById('alamat').value
            };

            let method = id === '' ? 'POST' : 'PUT';
            let url = id === '' ? apiUrl : `${apiUrl}/${id}`;

            fetch(url, {
                method: method,
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            }).then(res => res.json()).then(res => {
                alert(res.pesan);
                if(res.status === 'sukses') { resetForm(); loadData(); }
            });
        });

        function editData(ortu) {
            document.getElementById('form-title').innerText = 'Edit Data Orang Tua';
            document.getElementById('id_individu').value = ortu.id_individu;
            document.getElementById('nama').value = ortu.nama;
            document.getElementById('no_hp').value = ortu.no_hp;
            document.getElementById('email').value = ortu.email;
            document.getElementById('pekerjaan').value = ortu.pekerjaan;
            document.getElementById('kontak_darurat').value = ortu.kontak_darurat;
            document.getElementById('alamat').value = ortu.alamat;
            document.getElementById('btn-submit').innerText = 'Update Data';
            document.getElementById('btn-cancel').classList.remove('hidden');
        }

        function hapusData(id) {
            if(confirm('Hapus data orang tua ini?')) {
                fetch(`${apiUrl}/${id}`, { method: 'DELETE' })
                .then(res => res.json()).then(res => { alert(res.pesan); loadData(); });
            }
        }

        function resetForm() {
            document.getElementById('formOrangTua').reset();
            document.getElementById('id_individu').value = '';
            document.getElementById('form-title').innerText = 'Tambah Orang Tua Baru';
            document.getElementById('btn-submit').innerText = 'Simpan Data';
            document.getElementById('btn-cancel').classToadd = 'hidden';
        }
        document.getElementById('btn-cancel').addEventListener('click', resetForm);
        loadData();
    </script>
</body>
</html>
