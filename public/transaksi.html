<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transaksi Titip - Daycare</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 font-sans pb-10">
    <nav class="bg-blue-800 p-4 shadow-md text-white mb-6">
        <div class="container mx-auto flex justify-between px-4 items-center">
            <h1 class="text-xl font-bold">Manajemen Transaksi Titip</h1>
            <a href="index.html" class="text-sm bg-blue-700 hover:bg-blue-600 px-4 py-2 rounded transition-colors">⬅ Dashboard</a>
        </div>
    </nav>

    <div class="container mx-auto px-4 max-w-5xl">
        <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200 mb-8">
            <h3 id="form-title" class="text-lg font-bold mb-5 text-slate-800 border-b pb-2">Catat Transaksi Baru</h3>
            <form id="formTransaksi" class="grid grid-cols-1 md:grid-cols-2 gap-5">
                <input type="hidden" id="id_transaksi">
                
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1">ID Anak (Sesuai Data Anak)</label>
                    <input type="number" id="id_anak" min="1" oninput="if(this.value < 0) this.value = '';" required class="placeholder:italic w-full border border-slate-300 p-2.5 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none" placeholder="Contoh: 1">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1">Tanggal Penitipan</label>
                    <input type="date" id="tanggal_titip" required class="w-full border border-slate-300 p-2.5 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none">
                </div>
                
                <div class="md:col-span-2 flex gap-3 mt-2">
                    <button type="submit" id="btn-submit" class="bg-blue-600 text-white font-medium px-6 py-2.5 rounded-lg hover:bg-blue-700 transition-colors shadow-sm">Simpan Transaksi</button>
                    <button type="button" id="btn-cancel" class="hidden bg-slate-500 text-white font-medium px-6 py-2.5 rounded-lg hover:bg-slate-600 transition-colors shadow-sm">Batal</button>
                </div>
            </form>
        </div>

        <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-slate-100 text-slate-700 uppercase text-sm border-b">
                            <th class="p-4 font-semibold">ID Transaksi</th>
                            <th class="p-4 font-semibold">Data Anak</th>
                            <th class="p-4 font-semibold">Tanggal Titip</th>
                            <th class="p-4 font-semibold text-center">Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="data-transaksi" class="divide-y divide-slate-200 text-slate-800">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const apiUrl = '/api/transaksi';

        // 1. READ Data
        function loadData() {
            fetch(apiUrl)
                .then(res => res.json())
                .then(data => {
                    const tbody = document.getElementById('data-transaksi');
                    tbody.innerHTML = ''; 
                    
                    if (data.length === 0) {
                        tbody.innerHTML = '<tr><td colspan="4" class="p-6 text-center text-slate-500">Belum ada data transaksi.</td></tr>';
                        return;
                    }

                    data.forEach(trx => {
                        const tr = document.createElement('tr');
                        tr.className = "hover:bg-slate-50 transition-colors";
                        
                        // Perhatikan trx.nama_anak dipanggil berkat Query JOIN di Controller
                        tr.innerHTML = `
                            <td class="p-4 font-bold text-blue-700">${trx.id_transaksi}</td>
                            <td class="p-4">
                                <span class="font-medium text-slate-800">${trx.nama_anak || 'Nama Tidak Ditemukan'}</span>
                                <div class="text-xs text-slate-500 mt-1">ID Anak: ${trx.id_anak}</div>
                            </td>
                            <td class="p-4 font-medium">${trx.tanggal_titip}</td>
                            <td class="p-4 text-center">
                                <button onclick='editData(${JSON.stringify(trx)})' class="bg-amber-400 text-amber-900 font-medium px-3 py-1 rounded hover:bg-amber-500 mr-2 text-sm">Edit</button>
                                <button onclick="hapusData(${trx.id_transaksi})" class="bg-red-500 text-white font-medium px-3 py-1 rounded hover:bg-red-600 text-sm">Hapus</button>
                            </td>
                        `;
                        tbody.appendChild(tr);
                    });
                })
                .catch(err => console.error('Error fetching data:', err));
        }

        // 2. CREATE & UPDATE Data
        document.getElementById('formTransaksi').addEventListener('submit', function(e) {
            e.preventDefault();

            const id_transaksi = document.getElementById('id_transaksi').value;
            const payload = {
                id_anak: document.getElementById('id_anak').value,
                tanggal_titip: document.getElementById('tanggal_titip').value
            };

            let methodType = 'POST';
            let targetUrl = apiUrl; 

            if (id_transaksi !== '') {
                methodType = 'PUT';
                targetUrl = `${apiUrl}/${id_transaksi}`; 
            }

            fetch(targetUrl, {
                method: methodType,
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            })
            .then(res => res.json())
            .then(response => {
                alert(response.pesan);
                if(response.status === 'sukses') {
                    resetForm();
                    loadData(); 
                }
            })
            .catch(err => console.error('Error saving data:', err));
        });

        // 3. Menyiapkan Form untuk Edit
        function editData(trx) {
            document.getElementById('form-title').innerText = 'Edit Transaksi (' + trx.id_transaksi + ')';
            document.getElementById('id_transaksi').value = trx.id_transaksi;
            document.getElementById('id_anak').value = trx.id_anak;
            document.getElementById('tanggal_titip').value = trx.tanggal_titip;
            
            document.getElementById('btn-submit').innerText = 'Update Transaksi';
            document.getElementById('btn-submit').classList.replace('bg-blue-600', 'bg-amber-500');
            document.getElementById('btn-submit').classList.replace('hover:bg-blue-700', 'hover:bg-amber-600');
            document.getElementById('btn-cancel').classList.remove('hidden');
            
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // 4. DELETE Data
        function hapusData(id) {
            if(confirm('Yakin ingin menghapus transaksi ini? Data tidak dapat dikembalikan.')) {
                fetch(`${apiUrl}/${id}`, {
                    method: 'DELETE',
                    headers: { 'Content-Type': 'application/json' }
                })
                .then(res => res.json())
                .then(response => {
                    alert(response.pesan);
                    if(response.status === 'sukses') {
                        loadData(); 
                    }
                })
                .catch(err => console.error('Error deleting data:', err));
            }
        }

        // 5. Reset Form
        function resetForm() {
            document.getElementById('formTransaksi').reset();
            document.getElementById('id_transaksi').value = '';
            document.getElementById('form-title').innerText = 'Catat Transaksi Baru';
            
            document.getElementById('btn-submit').innerText = 'Simpan Transaksi';
            document.getElementById('btn-submit').classList.replace('bg-amber-500', 'bg-blue-600');
            document.getElementById('btn-submit').classList.replace('hover:bg-amber-600', 'hover:bg-blue-700');
            
            document.getElementById('btn-cancel').classList.add('hidden');
        }

        document.getElementById('btn-cancel').addEventListener('click', resetForm);

        // Load data pertama kali
        loadData();
    </script>
</body>
</html>
